<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="50%" style="stop-color:#ff79c6"/>
      <stop offset="100%" style="stop-color:#8be9fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <line x1="0" y1="50" x2="900" y2="50" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="0" y1="100" x2="900" y2="100" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="0" y1="150" x2="900" y2="150" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="450" y1="0" x2="450" y2="200" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <line x1="750" y1="0" x2="750" y2="200" stroke="#bd93f9" stroke-width="0.2" opacity="0.2"/>
  <circle cx="80" cy="40" r="2" fill="#bd93f9" opacity="0.7" filter="url(#glow)"><animate attributeName="cy" values="40;30;40" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="160" r="1.5" fill="#ff79c6" opacity="0.6" filter="url(#glow)"><animate attributeName="cy" values="160;148;160" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="50" r="2" fill="#8be9fd" opacity="0.7" filter="url(#glow)"><animate attributeName="cy" values="50;38;50" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="170" r="1.5" fill="#50fa7b" opacity="0.6" filter="url(#glow)"><animate attributeName="cy" values="170;158;170" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="30" r="1" fill="#ffb86c" opacity="0.5"><animate attributeName="cy" values="30;20;30" dur="4.5s" repeatCount="indefinite"/></circle>
  <rect x="60" y="148" width="340" height="3" rx="2" fill="url(#accent)" filter="url(#glow)"/>
  <text x="42" y="108" font-family="'Courier New', monospace" font-size="52" fill="#bd93f9" opacity="0.15" font-weight="bold">{</text>
  <text x="810" y="120" font-family="'Courier New', monospace" font-size="52" fill="#bd93f9" opacity="0.15" font-weight="bold">}</text>
  <text x="62" y="60" font-family="'Courier New', monospace" font-size="11" fill="#6272a4" opacity="0.8">&lt;dev&gt;</text>
  <text x="62" y="175" font-family="'Courier New', monospace" font-size="11" fill="#6272a4" opacity="0.8">&lt;/dev&gt;</text>
  <text x="60" y="105" font-family="'Courier New', monospace" font-size="38" font-weight="bold" fill="white">Wanderson Leles</text>
  <text x="62" y="135" font-family="'Courier New', monospace" font-size="16" fill="url(#accent)" filter="url(#glow)">Analista de BI  |  Desenvolvedor FullStack</text>
  <rect x="620" y="68" width="80" height="22" rx="11" fill="#bd93f9" opacity="0.15" stroke="#bd93f9" stroke-width="0.8"/>
  <text x="660" y="83" font-family="'Courier New', monospace" font-size="10" fill="#bd93f9" text-anchor="middle">Node.js</text>
  <rect x="710" y="68" width="80" height="22" rx="11" fill="#ff79c6" opacity="0.12" stroke="#ff79c6" stroke-width="0.8"/>
  <text x="750" y="83" font-family="'Courier New', monospace" font-size="10" fill="#ff79c6" text-anchor="middle">TypeScript</text>
  <rect x="800" y="68" width="70" height="22" rx="11" fill="#8be9fd" opacity="0.12" stroke="#8be9fd" stroke-width="0.8"/>
  <text x="835" y="83" font-family="'Courier New', monospace" font-size="10" fill="#8be9fd" text-anchor="middle">MySQL</text>
  <rect x="620" y="100" width="60" height="22" rx="11" fill="#50fa7b" opacity="0.12" stroke="#50fa7b" stroke-width="0.8"/>
  <text x="650" y="115" font-family="'Courier New', monospace" font-size="10" fill="#50fa7b" text-anchor="middle">Python</text>
  <rect x="690" y="100" width="55" height="22" rx="11" fill="#ffb86c" opacity="0.12" stroke="#ffb86c" stroke-width="0.8"/>
  <text x="717" y="115" font-family="'Courier New', monospace" font-size="10" fill="#ffb86c" text-anchor="middle">React</text>
  <rect x="755" y="100" width="40" height="22" rx="11" fill="#bd93f9" opacity="0.12" stroke="#bd93f9" stroke-width="0.8"/>
  <text x="775" y="115" font-family="'Courier New', monospace" font-size="10" fill="#bd93f9" text-anchor="middle">BI 4+</text>
</svg>
